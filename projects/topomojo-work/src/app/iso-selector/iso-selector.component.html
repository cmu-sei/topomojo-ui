<div class="input-group input-group-sm">
  <div class="input-group-prepend">
    <span class="input-group-text">Iso Selector</span>
  </div>
  <input type="search" class="form-control" [(ngModel)]="term" (input)="refresh()" placeholder="search">
  <div class="input-group-append">
    <button
      class="btn btn-sm btn-outline-info"
      btnCheckbox
      [(ngModel)]="filterLocal"
      (click)="refresh()"
      [tooltip]="showWorkspaceContext
        ? 'Show only global ISOs shared across all workspaces. Disable to see all workspace ISOs.'
        : 'With the Local filter enabled, you`ll only see ISOs available to this workspace. Disabling it shows global ISOs shared across all workspaces.'"
      placement="bottom"
      container="body"
      triggers="hover focus"
    >
      <fa-icon [icon]="faFilter"></fa-icon>
      <span>{{showWorkspaceContext ? 'Global Only' : 'Local'}}</span>
    </button>

    <button class="btn btn-sm btn-outline-info" (click)="refresh(true)">
      <fa-icon [icon]="faSync"></fa-icon>
      <span>Refresh</span>
    </button>
  </div>
</div>

<div *ngIf="files.length">

    <div *ngIf="!showWorkspaceContext" class="d-flex flex-wrap">
      <div *ngFor="let f of files" class="m-1 px-1 d-flex align-items-center">
        <button class="btn btn-outline-secondary btn-sm" (click)="select(f)">
          <fa-icon [icon]="faCompactDisc"></fa-icon>
          <span>{{f.display}}</span>
          <span *ngIf="f.isGlobal" class="badge badge-primary ml-1">Global</span>
        </button>

        <app-confirm-button
          *ngIf="canDelete"
          class="ml-1"
          btnClass="btn btn-outline-danger btn-sm"
          (confirm)="deleteIso(f)"
          [attr.aria-label]="'delete ' + f.display">
          <fa-icon [icon]="faTrash"></fa-icon>
        </app-confirm-button>
      </div>
    </div>

    <app-pager *ngIf="showWorkspaceContext" [skip]="skip" [take]="take" [count]="count" (changed)="paged($event)"></app-pager>
    <table *ngIf="showWorkspaceContext" class="table table-sm table-hover">
      <thead>
        <tr>
          <th scope="col">
            <button
              type="button"
              class="btn btn-link p-0 sort-header header-label text-primary"
              (click)="sortBy('name')">
              Name
              <fa-icon *ngIf="sortColumn === 'name'" [icon]="sortAscending ? faSortUp : faSortDown"></fa-icon>
            </button>
          </th>
          <th scope="col">
            <button
              type="button"
              class="btn btn-link p-0 sort-header header-label text-primary"
              (click)="sortBy('workspace')">
              Workspace
              <fa-icon *ngIf="sortColumn === 'workspace'" [icon]="sortAscending ? faSortUp : faSortDown"></fa-icon>
            </button>
          </th>
          <th scope="col" class="text-right">
            <span class="header-label text-primary">Actions</span>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let f of files">
          <td class="text-nowrap">
            <fa-icon [icon]="faCompactDisc" class="mr-2"></fa-icon>
            <span
              class="iso-filename"
              [tooltip]="f.filename"
              placement="top"
              container="body"
              triggers="hover focus"
            >{{f.filename}}</span>
          </td>
          <td>
            <span *ngIf="f.isGlobal" class="badge badge-primary">Global</span>
            <span *ngIf="!f.isGlobal && f.workspaceName !== '(deleted)'">
              {{f.workspaceName}}
              <br/>
              <small class="text-muted"><app-clipspan>{{f.workspaceId}}</app-clipspan></small>
            </span>
            <span *ngIf="!f.isGlobal && f.workspaceName === '(deleted)'">
              <span class="badge badge-secondary">(deleted)</span>
              <br/>
              <small class="text-muted"><app-clipspan>{{f.workspaceId}}</app-clipspan></small>
            </span>
          </td>
          <td class="text-right">
            <app-confirm-button
              *ngIf="canDelete"
              class="tm-action-host"
              btnClass="btn btn-outline-danger btn-sm tm-action-btn"
              (confirm)="deleteIso(f)"
              [attr.aria-label]="'delete ' + f.filename">
              <span class="d-inline-flex align-items-center">
                <fa-icon [icon]="faTrash"></fa-icon>
                <span>Delete</span>
              </span>
            </app-confirm-button>
          </td>
        </tr>
      </tbody>
    </table>

</div>

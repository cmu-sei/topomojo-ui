<div class="text-center">
  <button
    class="btn btn-outline-info btn-sm mx-1"
    (click)="show('default')"
    [tooltip]="'Show gamespace detail view.'"
    aria-label="Show gamespace detail view."
  >
    <fa-icon [icon]="faList"></fa-icon>
    <span>Detail</span>
  </button>
  <button
    class="btn btn-outline-info btn-sm mx-1"
    (click)="show('json')"
    [tooltip]="'Show gamespace data in JSON format.'"
    aria-label="Show gamespace data in JSON format."
  >
    <fa-icon [icon]="faJson"></fa-icon>
    <span>Json</span>
  </button>
  <button
    class="btn btn-outline-info btn-sm mx-1"
    (click)="show('dispatch')"
    [tooltip]="'Show dispatcher for sending commands to gamespace VMs.'"
    aria-label="Show dispatcher for sending commands to gamespace VMs."
  >
    <fa-icon [icon]="faKeyboard"></fa-icon>
    <span>Dispatcher</span>
  </button>
</div>

<pre *ngIf="showing==='json'">{{detail | json}}</pre>

<div *ngIf="showing==='dispatch'">
  <app-gamespace-interact [id]="gamespace.id"></app-gamespace-interact>
</div>

<div *ngIf="showing==='default'">
  <!-- TODO: make ui -->
</div>
